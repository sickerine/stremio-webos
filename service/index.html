<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Stremio</title>
    <script>window.__STREMIO_SERVER_URL__ = 'http://127.0.0.1:8081';</script>
    <script>
        // Preload the Anime schedule at app start: warms the server-side
        // AniList/Kitsu cache and gives the page instant data on first open.
        try { window.__animePreload = fetch('/anime-airing/schedule-week.json').then(function (r) { return r.json(); }); } catch (e) {}
    </script>
    <style>
        /* Live airing overlay drawn on schedule posters (Anime page). */
        .ap-ov { position: absolute; left: 0; right: 0; bottom: 0; z-index: 3;
            display: flex; flex-direction: column; align-items: center; gap: .35rem;
            padding: 3.2rem .5rem .7rem; pointer-events: none;
            background: linear-gradient(transparent, rgba(8,8,12,.55) 45%, rgba(8,8,12,.95)); }
        .ap-ov-ep { font-size: .82rem; font-weight: 700; letter-spacing: .09em; text-transform: uppercase;
            color: hsla(0,0%,100%,.55); }
        .ap-ov-cd { font-size: 1.05rem; font-weight: 700; color: #fff; white-space: nowrap;
            padding: .18rem .75rem; border-radius: 1rem; background: rgba(123,91,245,.92);
            box-shadow: 0 .2rem .6rem rgba(0,0,0,.35); }
    </style>
    <script>
        // For anime (kitsu ids) re-sort streams by seeders (health matters more
        // than a mislabeled quality tag); everything else keeps Torrentio's
        // default quality-first order.
        window.__sortAnimeStreams = function (streams) {
            try {
                if (!streams || streams.length < 2) return streams;
                var h = '';
                try { h = decodeURIComponent(location.hash || ''); } catch (e) { h = location.hash || ''; }
                if (h.indexOf('kitsu:') < 0 && h.indexOf('/detail/anime/') < 0) return streams;
                var seed = function (s) {
                    var t = (s && (s.title || s.description || s.name)) || '';
                    var m = t.match(/👤\s*(\d+)/); // 👤 N
                    return m ? parseInt(m[1], 10) : -1;
                };
                return streams.slice().sort(function (a, b) { return seed(b) - seed(a); });
            } catch (e) { return streams; }
        };
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(rs) {
                rs.forEach(function(r) { r.unregister(); });
            }).catch(function(){});
        }
    </script>
    <script defer src="runtime.js"></script>
    <script defer src="main.js"></script>
    <script defer src="service.js"></script>
    <script defer src="webOSTV.js"></script>
</head>
<body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
</body>
</html>
