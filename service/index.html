<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Stremio</title>
    <script>window.__STREMIO_SERVER_URL__ = 'http://127.0.0.1:8081';</script>
    <script>
        // Preload the Anime schedule at app start: warms the server-side
        // AniList/Kitsu cache and gives the page instant data on first open.
        try { window.__animePreload = fetch('/anime-airing/schedule-week.json').then(function (r) { return r.json(); }); } catch (e) {}
    </script>
    <style>
        html, body { background: #000; }
        /* Kill blurred poster backgrounds (home + details) — no GPU blur/composite. */
        .background-container-D9GP9,
        .background-G0atu { display: none !important; }
        .background-image-Tlzwm,
        .image-fkksf.blurred-LTDh_,
        .background-G0atu .image-fkksf { display: none !important; }
        /* Live airing overlay drawn on schedule posters (Anime page). */
        .ap-ov { position: absolute; left: 0; right: 0; bottom: 0; z-index: 3;
            display: flex; flex-direction: column; align-items: center; gap: .35rem;
            padding: 3.2rem .5rem .7rem; pointer-events: none;
            background: linear-gradient(transparent, rgba(8,8,12,.55) 45%, rgba(8,8,12,.95)); }
        .ap-ov-ep { font-size: .82rem; font-weight: 700; letter-spacing: .09em; text-transform: uppercase;
            color: hsla(0,0%,100%,.55); }
        .ap-ov-cd { font-size: 1.05rem; font-weight: 700; color: #fff; white-space: nowrap;
            padding: .18rem .75rem; border-radius: 1rem; background: rgba(123,91,245,.92);
            box-shadow: 0 .2rem .6rem rgba(0,0,0,.35); }
        .ap-nu-name { max-width: 92%; font-size: 1.1rem; font-weight: 700; color: hsla(0,0%,100%,.92);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-shadow: 0 .1rem .3rem rgba(0,0,0,.8); }
        .ap-nu-bar { width: 78%; height: .4rem; border-radius: .25rem; background: rgba(255,255,255,.18); overflow: hidden; }
        .ap-nu-in { height: 100%; width: 0; background: #7b5bf5; }
        .JASSUB { position: fixed !important; top: 0 !important; left: 0 !important;
            width: 100vw !important; height: 100vh !important; margin: 0 !important;
            pointer-events: none !important; z-index: 2147482000 !important; }
        .JASSUB canvas { position: absolute !important; top: 0 !important; left: 0 !important;
            width: 100% !important; height: 100% !important; }
        /* Stream-list quality badges (details page cards). */
        .sbags { display: none; flex-direction: row; flex-wrap: nowrap; align-items: center;
            gap: .4rem; margin: 0 0 .35rem 0 !important; max-width: 100%; overflow: hidden; }
        .sbags.has { display: flex; }
        .sbag { flex: none; font-size: 1.05rem; font-weight: 800; letter-spacing: .04em;
            line-height: 1; padding: .28rem .55rem; border-radius: .35rem; text-transform: uppercase;
            border: 1px solid transparent; white-space: nowrap; }
        .sbag-4k { background: #f5c518; color: #14110a; border-color: #ffe56a;
            box-shadow: 0 0 .55rem rgba(245, 197, 24, .35); }
        .sbag-1080p { background: #163a66; color: #b7d7ff; border-color: #4d95e8; }
        .sbag-720p { background: #2a3038; color: #c2c8d0; border-color: #5a6570; }
        .sbag-480p { background: #1c1c1c; color: #8a8a8a; border-color: #444; }
        .sbag-hdr { background: linear-gradient(135deg, #ff3d6e 0%, #ff8a1f 100%); color: #fff;
            border-color: #ffb347; text-shadow: 0 1px 1px rgba(0,0,0,.35); }
        .sbag-bd { background: #0b6e6a; color: #e8fffc; border-color: #2dd4bf;
            box-shadow: 0 0 .45rem rgba(45, 212, 191, .25); }
        /* Hide Torrentio provider title; filename lives in description. */
        [class*="stream-"] [class*="name-"] { display: none !important; }
        [class*="stream-"] [class*="description-"] { color: hsla(0,0%,100%,.88) !important; font-weight: 600 !important;
            white-space: normal !important; display: -webkit-box !important; -webkit-box-orient: vertical;
            -webkit-line-clamp: 2; overflow: hidden; line-height: 1.25; }
    </style>
    <script>
        // For anime (kitsu ids): filter streams by the entry's saved release
        // kind (all | seasonal | bd), then re-sort by seeders (health matters
        // more than a mislabeled quality tag). Everything else keeps
        // Torrentio's default quality-first order.
        // - BD: BD/BDRip/BDMV/Blu-ray/Remux/JPBD with loose boundaries (BD1080p).
        // - Seasonal: known simulcast release groups, minus anything BD-marked
        //   (Judas/EMBER/Anime Time also publish BD batches).
        // Empty result is honest (e.g. BD on a currently-airing show).
        (function () {
            var BD_RE = /(^|[^a-z0-9])(bd(rip|mv)?|blu-?ray|remux|jpbd)([^a-z]|$)/i;
            var GROUPS = ['subsplease', 'erai-raws', 'erai raws', 'judas', 'asw', 'yameii', 'toonshub', 'dkb', 'anime time', 'horriblesubs', 'ember', 'asakura', 'ironclad', 'feibanyama'];
            var INLINE = ['varyg', 'tsundere-raws', 'tsundere raws'];
            function entryId() {
                var h = '';
                try { h = decodeURIComponent(location.hash || ''); } catch (e) { h = location.hash || ''; }
                var m = h.match(/kitsu:\d+/);
                return m ? m[0] : null;
            }
            window.__animeStreamKind = function () {
                var id = entryId();
                if (!id) return 'all';
                try { return localStorage.getItem('animeStreamKind:' + id) || 'all'; } catch (e) { return 'all'; }
            };
            window.__setAnimeStreamKind = function (kind) {
                var id = entryId();
                if (!id) return;
                try { localStorage.setItem('animeStreamKind:' + id, kind); } catch (e) {}
            };
            function isBD(t) { return BD_RE.test(t); }
            function isSeasonal(t) {
                if (isBD(t)) return false;
                var tl = t.toLowerCase();
                var lines = tl.split('\n');
                for (var k = 0; k < lines.length; k++) {
                    var m = lines[k].trim().match(/^\[([^\]]+)\]/);
                    if (m) { var g = m[1]; for (var i = 0; i < GROUPS.length; i++) if (g.indexOf(GROUPS[i]) === 0) return true; }
                }
                for (var j = 0; j < INLINE.length; j++) if (tl.indexOf(INLINE[j]) >= 0) return true;
                return false;
            }
            // Library membership for poster indicators. The library lives in
            // the ACCOUNT; the worker fetch interceptor tees the app's own
            // datastore sync into /library-cache, which we poll here.
            var __libSet = new Set();
            function __libPoll() {
                fetch('/library-cache').then(function (r) { return r.json(); }).then(function (d) {
                    __libSet = new Set((d && d.ids) || []);
                }).catch(function () {});
            }
            __libPoll();
            setInterval(__libPoll, 10000);
            window.__inLibrary = function (id) { return __libSet.has(id); };
            // Instant local update when the app adds/removes on THIS device (the
            // 10s poll only catches other devices / the initial pull). Also
            // persists the change to the service cache so other pages/restarts
            // stay consistent until the next full pull.
            window.__libMark = function (id, inLib) {
                if (!id) return;
                if (inLib) __libSet.add(id); else __libSet.delete(id);
                try { fetch('/library-cache', { method: 'POST', body: JSON.stringify({ upsert: [{ id: id, removed: !inLib }] }) }).catch(function () {}); } catch (e) {}
                // Let live views (Next Up row) react immediately. Delayed so the
                // core has pushed the change to the account before we re-pull.
                try { setTimeout(function () { window.dispatchEvent(new Event('libchange')); }, 1500); } catch (e) {}
            };
            window.__sortAnimeStreams = function (streams, kindArg) {
                try {
                    if (!streams || !streams.length) return streams;
                    var id = entryId();
                    if (!id) return streams;
                    var kind = kindArg || window.__animeStreamKind();
                    var list = streams;
                    // core-transformed streams carry the torrent text in
                    // .description (title is often empty) — match on all of them.
                    var txt = function (s) { return ((s && (s.title || '')) + '\n' + (s && (s.description || '')) + '\n' + (s && (s.name || ''))); };
                    if ('bd' === kind) list = streams.filter(function (s) { return isBD(txt(s)); });
                    else if ('seasonal' === kind) list = streams.filter(function (s) { return isSeasonal(txt(s)); });
                    var seed = function (s) {
                        var t = (s && (s.title || s.description || s.name)) || '';
                        var m = t.match(/👤\s*(\d+)/); // 👤 N
                        return m ? parseInt(m[1], 10) : -1;
                    };
                    return list.slice().sort(function (a, b) { return seed(b) - seed(a); });
                } catch (e) { return streams; }
            };
            // Distinctive badges for stream cards. Res/HDR from Torrentio's
            // normalized `name` line; BD from title/description (never in name).
            var RES_ORDER = ['4K', '1080p', '720p', '480p'];
            var RES_RE = [
                ['4K', /(?:^|[^a-z0-9])(?:2160p|4k|uhd)(?:[^a-z0-9]|$)/i],
                ['1080p', /(?:^|[^a-z0-9])1080p(?:[^a-z0-9]|$)/i],
                ['720p', /(?:^|[^a-z0-9])720p(?:[^a-z0-9]|$)/i],
                ['480p', /(?:^|[^a-z0-9])480p(?:[^a-z0-9]|$)/i]
            ];
            var HDR_RE = /(?:^|[^a-z0-9])(?:hdr10\+?|hdr|dolby[ ._-]?vision)(?:[^a-z0-9]|$)/i;
            function qualityLine(name) {
                var lines = String(name || '').split('\n'), out = [], i, ln;
                for (i = 0; i < lines.length; i++) {
                    ln = lines[i].trim();
                    if (!ln) continue;
                    if (/^\[tb/i.test(ln)) continue; // [TB+] / [TB download]
                    out.push(ln);
                }
                return out.join(' ');
            }
            function pickRes(text) {
                var i;
                for (i = 0; i < RES_RE.length; i++) if (RES_RE[i][1].test(text)) return RES_RE[i][0];
                return null;
            }
            window.__streamBadges = function (stream) {
                try {
                    var name = (stream && stream.name) || '';
                    var blob = ((stream && stream.title) || '') + '\n' + ((stream && stream.description) || '') + '\n' + name;
                    var q = qualityLine(name);
                    var res = pickRes(q) || pickRes(blob);
                    var badges = [];
                    if (res) badges.push(res);
                    if (HDR_RE.test(q) || HDR_RE.test(blob)) badges.push('HDR');
                    if (isBD(blob)) badges.push('BD');
                    return badges;
                } catch (e) { return []; }
            };
            // Show provider line only in the name slot (quality moves to badges).
            window.__streamDisplayName = function (stream) {
                try {
                    var name = String((stream && stream.name) || '');
                    var lines = name.split('\n'), i, ln;
                    for (i = 0; i < lines.length; i++) {
                        ln = lines[i].trim();
                        if (ln) return ln;
                    }
                    return name;
                } catch (e) { return (stream && stream.name) || ''; }
            };
            window.__paintStreamBadges = function (el, stream) {
                try {
                    if (!el) return;
                    var badges = window.__streamBadges(stream);
                    el.textContent = '';
                    if (!badges.length) { el.classList.remove('has'); return; }
                    el.classList.add('has');
                    badges.forEach(function (b) {
                        var s = document.createElement('span');
                        s.className = 'sbag sbag-' + String(b).toLowerCase();
                        s.textContent = b;
                        el.appendChild(s);
                    });
                } catch (e) {}
            };
        })();
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(rs) {
                rs.forEach(function(r) { r.unregister(); });
            }).catch(function(){});
        }
    </script>
