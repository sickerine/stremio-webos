<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Stremio</title>
    <script>window.__STREMIO_SERVER_URL__ = 'http://127.0.0.1:8081';</script>
    <script>
        // Anime tab overlay: a full-screen iframe grid (served at /anime.html)
        // opened from the injected sidebar button, closed on Back or selection.
        window.__openAnimeGrid = function () {
            if (document.getElementById('__animeGrid')) return;
            var o = document.createElement('div');
            o.id = '__animeGrid';
            o.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;width:100%;height:100%;z-index:2147483000;background:#0c0b11';
            var f = document.createElement('iframe');
            f.src = '/anime.html';
            f.setAttribute('scrolling', 'no');
            f.style.cssText = 'width:100%;height:100%;border:0;display:block';
            o.appendChild(f);
            document.body.appendChild(o);
            setTimeout(function () { try { f.contentWindow.focus(); } catch (e) {} }, 60);
        };
        window.__closeAnimeGrid = function () {
            var o = document.getElementById('__animeGrid');
            if (o) o.parentNode.removeChild(o);
        };
        // For anime (kitsu ids) re-sort streams by seeders (health matters more
        // than a mislabeled quality tag); everything else keeps Torrentio's
        // default quality-first order.
        window.__sortAnimeStreams = function (streams) {
            try {
                if (!streams || streams.length < 2) return streams;
                var h = '';
                try { h = decodeURIComponent(location.hash || ''); } catch (e) { h = location.hash || ''; }
                if (h.indexOf('kitsu:') < 0 && h.indexOf('/detail/anime/') < 0) return streams;
                var seed = function (s) {
                    var t = (s && (s.title || s.description || s.name)) || '';
                    var m = t.match(/👤\s*(\d+)/); // 👤 N
                    return m ? parseInt(m[1], 10) : -1;
                };
                return streams.slice().sort(function (a, b) { return seed(b) - seed(a); });
            } catch (e) { return streams; }
        };
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(rs) {
                rs.forEach(function(r) { r.unregister(); });
            }).catch(function(){});
        }
    </script>
    <script defer src="runtime.js"></script>
    <script defer src="main.js"></script>
    <script defer src="service.js"></script>
    <script defer src="webOSTV.js"></script>
</head>
<body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
</body>
</html>
