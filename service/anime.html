<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Currently Airing</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: #0c0b11; color: #fff;
    font-family: "Plus Jakarta Sans", system-ui, sans-serif; overflow: hidden; }
  #hdr { padding: 3vh 4vw 1.5vh; font-size: 3.2vh; font-weight: 700; letter-spacing: .3px; }
  #hdr small { font-weight: 400; opacity: .5; font-size: 2vh; margin-left: 1vw; }
  #grid { height: calc(100% - 8vh); overflow-y: auto; padding: 1vh 4vw 6vh;
    display: grid; grid-template-columns: repeat(6, 1fr); gap: 2.4vh 1.6vw; }
  .card { position: relative; border-radius: 1vh; overflow: hidden; cursor: pointer;
    background: #1a1922; outline: none; transition: transform .12s ease; }
  .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; }
  .card .t { position: absolute; left: 0; right: 0; bottom: 0; padding: 3.2vh .6vw .5vh;
    font-size: 1.55vh; line-height: 1.25; background: linear-gradient(transparent, rgba(0,0,0,.92));
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card.focused { transform: scale(1.06); box-shadow: 0 0 0 .4vh #7b5bf5, 0 1vh 3vh rgba(0,0,0,.6); z-index: 2; }
  #msg { padding: 6vh 4vw; opacity: .6; font-size: 2.2vh; }
</style>
</head>
<body>
<div id="hdr">Currently Airing<small id="cnt"></small></div>
<div id="grid"><div id="msg">Loading current season…</div></div>
<script>
(function () {
  var grid = document.getElementById('grid'), cnt = document.getElementById('cnt');
  var items = [], cards = [], focus = 0, cols = 6;

  function go(id) {
    // Hand off to the native Stremio detail page and close the overlay.
    try {
      var top = window.parent && window.parent !== window ? window.parent : window;
      top.location.hash = '#/detail/anime/' + encodeURIComponent(id);
      if (top.__closeAnimeGrid) top.__closeAnimeGrid();
    } catch (e) { location.hash = '#/detail/anime/' + encodeURIComponent(id); }
  }
  function close() {
    var top = window.parent && window.parent !== window ? window.parent : window;
    if (top.__closeAnimeGrid) top.__closeAnimeGrid();
  }

  function setFocus(i) {
    if (!cards.length) return;
    i = Math.max(0, Math.min(cards.length - 1, i));
    if (cards[focus]) cards[focus].classList.remove('focused');
    focus = i;
    cards[focus].classList.add('focused');
    cards[focus].scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }

  function onKey(e) {
    var k = e.keyCode;
    if (k === 461 || k === 27 || k === 8 || k === 10009) { e.preventDefault(); return close(); } // back/esc
    if (k === 37) { e.preventDefault(); setFocus(focus - 1); }
    else if (k === 39) { e.preventDefault(); setFocus(focus + 1); }
    else if (k === 38) { e.preventDefault(); setFocus(focus - cols); }
    else if (k === 40) { e.preventDefault(); setFocus(focus + cols); }
    else if (k === 13) { e.preventDefault(); if (items[focus]) go(items[focus].id); }
  }

  function render(metas) {
    items = metas || [];
    grid.innerHTML = '';
    cards = [];
    if (!items.length) { grid.innerHTML = '<div id="msg">No airing anime found (retry in a moment).</div>'; return; }
    cnt.textContent = items.length + ' shows';
    cols = Math.max(1, Math.floor(grid.clientWidth / (grid.clientWidth / 6)));
    items.forEach(function (m, idx) {
      var c = document.createElement('div');
      c.className = 'card'; c.tabIndex = 0;
      var img = m.poster ? '<img src="' + m.poster + '" loading="lazy" onerror="this.style.opacity=.15">' : '<img>';
      c.innerHTML = img + '<div class="t">' + (m.name || '').replace(/[<>&]/g, '') + '</div>';
      c.addEventListener('click', function () { go(m.id); });
      c.addEventListener('mouseenter', function () { setFocus(idx); });
      grid.appendChild(c); cards.push(c);
    });
    // derive real column count from layout
    if (cards.length > 1) {
      var y0 = cards[0].offsetTop, n = 1;
      while (n < cards.length && cards[n].offsetTop === y0) n++;
      cols = n;
    }
    setFocus(0);
  }

  document.addEventListener('keydown', onKey, true);
  window.addEventListener('resize', function () { if (items.length) render(items); });

  fetch('/anime-airing/catalog/anime/anilist-airing.json')
    .then(function (r) { return r.json(); })
    .then(function (d) { render(d.metas || []); })
    .catch(function () { grid.innerHTML = '<div id="msg">Failed to load. Is the internet up?</div>'; });
})();
</script>
</body>
</html>
