<!doctype html>
<html>
<head><meta charset="UTF-8"><title>Stremio</title></head>
<body style="background:#0c0b11;margin:0;display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif">
<div id="status" style="color:rgba(255,255,255,0.6);font-size:24px">Loading Stremio...</div>
<script>
var done = false;
var bridge = new PalmServiceBridge();
bridge.onservicecallback = function(response) {
    done = true;
    var data = JSON.parse(response);
    if (data.ready) location.href = 'http://127.0.0.1:8080/';
};
bridge.call('luna://io.strem.tv.server/start', '{}');
setTimeout(function() {
    if (done) return;
    document.body.innerHTML =
        '<div style="color:#fff;text-align:center;max-width:600px;padding:0 24px">' +
        '<div style="font-size:28px;margin-bottom:12px">Stremio service didn\'t start</div>' +
        '<div style="color:rgba(255,255,255,0.6);font-size:18px;margin-bottom:32px">Try again, or check Homebrew Channel logs if this keeps happening.</div>' +
        '<button onclick="location.reload()" style="padding:14px 32px;font-size:20px;background:#7b5bf5;color:#fff;border:0;border-radius:6px;cursor:pointer">Retry</button>' +
        '</div>';
}, 30000);
</script>
</body>
</html>
